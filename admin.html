<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — AV 주간 진행현황</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f5f6fa; color: #1a1a2e; font-size: 13px; }

    /* 헤더 */
    #header {
      background: #1a1a2e; color: white;
      padding: 0 24px; height: 54px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .btn-ghost {
      padding: 5px 13px; background: transparent;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 5px;
      color: white; font-size: 12px; font-family: inherit; cursor: pointer;
      text-decoration: none; transition: all 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    /* 메인 */
    main { max-width: 860px; margin: 32px auto; padding: 0 24px; }

    /* 카드 */
    .card { background: white; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .card-header {
      padding: 15px 22px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; }

    /* 버튼 */
    .btn { padding: 7px 16px; border: none; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-primary:hover { background: #2d3561; }
    .btn-edit { background: #f5f5f5; color: #333; }
    .btn-edit:hover { background: #ebebeb; }
    .btn-del { background: #fee2e2; color: #991b1b; }
    .btn-del:hover { background: #fecaca; }
    .btn-sm { padding: 4px 11px; font-size: 11px; }

    /* 사용자 행 */
    .user-row {
      padding: 14px 22px; border-bottom: 1px solid #f5f5f5;
      display: flex; align-items: center; gap: 14px;
    }
    .user-row:last-child { border-bottom: none; }
    .color-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.08); }
    .user-info { flex: 1; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .user-email { font-size: 11px; color: #4285f4; margin-top: 1px; }
    .user-actions { display: flex; gap: 7px; }

    /* 모달 */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal { background: white; border-radius: 12px; padding: 30px 32px; width: 480px; max-width: 92vw; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 22px; }

    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 11px; font-weight: 600; color: #666; margin-bottom: 5px; }
    .fg input, .fg select {
      width: 100%; padding: 9px 11px;
      border: 1px solid #ddd; border-radius: 6px;
      font-family: inherit; font-size: 13px; transition: border-color 0.15s;
    }
    .fg input:focus, .fg select:focus { outline: none; border-color: #4285f4; }
    .fg input[type="color"] { height: 40px; padding: 3px 8px; cursor: pointer; }
    .form-row { display: flex; gap: 12px; }
    .form-row .fg { flex: 1; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
    .btn-cancel { padding: 8px 18px; background: #f5f5f5; border: none; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; }

    /* 공통 */
    .empty-state { padding: 44px; text-align: center; color: #bbb; }
    .hidden { display: none !important; }

    /* 로그인 가드 */
    #guard {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f5f6fa; color: #aaa; font-size: 14px;
    }
  </style>
</head>
<body>

<div id="guard">인증 확인 중...</div>

<div id="mainWrap" class="hidden">
  <div id="header">
    <div class="header-title">관리자 페이지</div>
    <div class="header-right">
      <a href="index.html" class="btn-ghost">← 보드로 돌아가기</a>
      <button class="btn-ghost" onclick="doSignOut()">로그아웃</button>
    </div>
  </div>

  <main>
    <div class="card">
      <div class="card-header">
        <div class="card-title">사용자 관리</div>
        <button class="btn btn-primary" onclick="openModal()">+ 사용자 추가</button>
      </div>
      <div id="userList"><div class="empty-state">불러오는 중...</div></div>
    </div>
  </main>
</div>

<!-- 모달 -->
<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">사용자 추가</div>

    <div class="fg">
      <label>Google 이메일 *</label>
      <input type="email" id="fEmail" placeholder="example@gmail.com">
    </div>
    <div class="form-row">
      <div class="fg">
        <label>이름 *</label>
        <input type="text" id="fName" placeholder="홍길동">
      </div>
      <div class="fg">
        <label>직급</label>
        <input type="text" id="fTitle" placeholder="대리">
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label>부서</label>
        <input type="text" id="fDept" placeholder="설계팀">
      </div>
      <div class="fg">
        <label>배지 색상</label>
        <input type="color" id="fColor" value="#3b82f6">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveUser()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }
                                from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, onValue, push, set, update, remove, get, query, orderByChild, equalTo }
                                from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app  = initializeApp({
  apiKey: "AIzaSyDkXa53xtOZIJtfQuS24eEQjgq4J2czZOA",
  authDomain: "av-board-8e12f.firebaseapp.com",
  databaseURL: "https://av-board-8e12f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "av-board-8e12f",
  storageBucket: "av-board-8e12f.firebasestorage.app",
  messagingSenderId: "962231746635",
  appId: "1:962231746635:web:22500e6d2d2cd548880dce"
});
const auth = getAuth(app);
const db   = getDatabase(app);

const $ = id => document.getElementById(id);
let editingKey = null;

window.doSignOut = () => signOut(auth).then(() => location.href = 'index.html');
window.openModal = openModal;
window.closeModal = closeModal;
window.saveUser = saveUser;
window.deleteUser = deleteUser;

// 인증 가드
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'index.html'; return; }
  try {
    const snap = await get(query(ref(db,'users'), orderByChild('email'), equalTo(user.email)));
    if (!snap.exists()) { location.href = 'index.html'; return; }
    $('guard').classList.add('hidden');
    $('mainWrap').classList.remove('hidden');
  } catch(e) { location.href = 'index.html'; }
});

// 사용자 목록 실시간 반영
onValue(ref(db,'users'), snap => {
  const users = snap.val() || {};
  const entries = Object.entries(users).sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''));
  if (!entries.length) { $('userList').innerHTML='<div class="empty-state">등록된 사용자가 없습니다.</div>'; return; }
  $('userList').innerHTML = entries.map(([key,u]) => `
    <div class="user-row">
      <div class="color-dot" style="background:${u.color||'#999'}"></div>
      <div class="user-info">
        <div class="user-name">${esc(u.name||'')} <span style="font-weight:400;color:#888;font-size:12px">${esc(u.title||'')}</span></div>
        <div class="user-meta">${esc(u.department||'부서 없음')}</div>
        <div class="user-email">${esc(u.email||'')}</div>
      </div>
      <div class="user-actions">
        <button class="btn btn-sm btn-edit" onclick="openModal('${key}')">수정</button>
        <button class="btn btn-sm btn-del" onclick="deleteUser('${key}','${esc(u.name||'')}')">삭제</button>
      </div>
    </div>`).join('');
});

function openModal(key = null) {
  editingKey = key;
  $('modalTitle').textContent = key ? '사용자 수정' : '사용자 추가';
  if (key) {
    get(ref(db,`users/${key}`)).then(snap => {
      const u = snap.val() || {};
      $('fEmail').value=$('fName').value=$('fTitle').value=$('fDept').value='';
      $('fEmail').value=u.email||''; $('fName').value=u.name||'';
      $('fTitle').value=u.title||''; $('fDept').value=u.department||'';
      $('fColor').value=u.color||'#3b82f6';
    });
  } else {
    $('fEmail').value=$('fName').value=$('fTitle').value=$('fDept').value='';
    $('fColor').value='#3b82f6';
  }
  $('overlay').classList.remove('hidden');
  setTimeout(()=>$('fEmail').focus(),100);
}

function closeModal() { $('overlay').classList.add('hidden'); editingKey=null; }

function saveUser() {
  const email=$('fEmail').value.trim(), name=$('fName').value.trim();
  if (!email||!name) { alert('이메일과 이름은 필수입니다.'); return; }
  const data = { email, name, title:$('fTitle').value.trim(), department:$('fDept').value.trim(), color:$('fColor').value };
  const dbRef = editingKey ? ref(db,`users/${editingKey}`) : push(ref(db,'users'));
  set(dbRef, data).then(closeModal).catch(err=>alert('저장 실패: '+err.message));
}

function deleteUser(key, name) {
  if (!confirm(`"${name}" 사용자를 삭제할까요?\n업무 데이터도 함께 삭제됩니다.`)) return;
  remove(ref(db,`users/${key}`)); remove(ref(db,`tasks/${key}`));
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
